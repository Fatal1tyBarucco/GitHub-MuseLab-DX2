name: 2GP Feature Test

on:
  workflow_call:
    secrets:
      dev-hub-auth-url:
        required: false
      dev-hub-username:
        required: false
      dev-hub-client-id:
        required: false
      dev-hub-private-key:
        required: false
      gh-email:
        required: true
      github-token:
        required: true

jobs:
  feature-test:
    name: Feature Test
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/muselab-d2x/d2x:latest   # 🔒 evitar latest
      options: --user 0
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github-token }}

    env:
      DEV_HUB_AUTH_URL: ${{ secrets.dev-hub-auth-url }}
      DEV_HUB_USERNAME: ${{ secrets.dev-hub-username }}
      DEV_HUB_CLIENT_ID: ${{ secrets.dev-hub-client-id }}
      DEV_HUB_PRIVATE_KEY: ${{ secrets.dev-hub-private-key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Validar credenciais DevHub
      # -----------------------------
      - name: Validate DevHub auth inputs
        run: |
          set -e

          if [[ -z "$DEV_HUB_AUTH_URL" && -z "$DEV_HUB_USERNAME" ]]; then
            echo "ERROR: DevHub credentials not provided"
            exit 1
          fi

      # -----------------------------
      # Setup GitHub service (seguro)
      # -----------------------------
      - name: Configure CumulusCI GitHub service
        run: |
          set -e

          cat <<EOF > github-service.json
          {
            "username": "${{ github.actor }}",
            "token": "${{ secrets.github-token }}",
            "email": "${{ secrets.gh-email }}"
          }
          EOF

          export CUMULUSCI_SERVICE_github="$(cat github-service.json)"

      # -----------------------------
      # Autenticação DevHub
      # -----------------------------
      - name: Auth to DevHub
        run: |
          set -e
          /usr/local/bin/devhub.sh

      # -----------------------------
      # Set default org
      # -----------------------------
      - name: Set feature org as default org
        run: |
          set -e
          cci org default feature
      
      # -----------------------------
      # Configure GitHub service
      # -----------------------------
      - name: Configure GitHub service for CCI
        run: |
          set -e

          cci service connect github <<EOF
          {
            "username": "${{ github.actor }}",
            "token": "${{ secrets.GITHUB_TOKEN }}",
            "email": "${{ secrets.GH_EMAIL }}"
          }
          EOF

      # -----------------------------
      # Run Feature Tests
      # -----------------------------
      - name: Run Feature Test
        run: |
          set -e
          cci flow run ci_feature

      # -----------------------------
      # Cleanup sempre executa
      # -----------------------------
      - name: Delete Scratch Org
        if: always()
        run: |
          set +e
          cci org scratch_delete feature || true