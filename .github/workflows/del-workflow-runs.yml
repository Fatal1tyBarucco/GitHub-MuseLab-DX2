name: Delete old workflow runs

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: '0 0 * * 1'

jobs:
  cleanup:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete old workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO=$(gh repo view --json nameWithOwner -q .nameWithOwner)

          echo "Repository: $REPO"

          # Lista runs antigos (somente completed para segurança)
          RUN_IDS=$(gh run list \
            --limit 50 \
            --json databaseId,status \
            --jq '.[] | select(.status=="completed") | .databaseId')

          if [ -z "$RUN_IDS" ]; then
            echo "No workflow runs to delete."
            exit 0
          fi

          echo "Deleting runs..."

          for ID in $RUN_IDS; do
            echo "Deleting run $ID"
            gh api \
              -X DELETE \
              "repos/$REPO/actions/runs/$ID" \
              || echo "Failed to delete $ID"
          done